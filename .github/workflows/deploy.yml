name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASES_TO_KEEP: "3"
      NODE_VERSION: "22"
      SSH_PORT: "54327"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify _htaccess is in build output
        run: test -f dist/portafolio/browser/_htaccess || (echo "::error::_htaccess missing from build output" && exit 1)

      - name: Setup SSH key on runner
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/cpanel_deploy
          chmod 600 ~/.ssh/cpanel_deploy
          echo "=== Key fingerprint from GitHub Secret ==="
          ssh-keygen -l -f ~/.ssh/cpanel_deploy 2>&1 || echo "ERROR: cannot load key from secret"
          echo "=== Test passphrase (should NOT prompt) ==="
          ssh-keygen -y -f ~/.ssh/cpanel_deploy 2>&1 | head -1

      - name: Clean staging on server
        run: |
          ssh -i ~/.ssh/cpanel_deploy \
              -p ${SSH_PORT} \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o PreferredAuthentications=publickey \
              ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} \
              "rm -rf ~/public_html_new && mkdir -p ~/public_html_new"

      - name: Upload build via SSH tar pipe
        run: |
          set -euxo pipefail
          tar czf - -C dist/portafolio/browser . | ssh -i ~/.ssh/cpanel_deploy \
              -p ${SSH_PORT} \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o PreferredAuthentications=publickey \
              ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} \
              "tar xzf - -C ~/public_html_new"

      - name: Atomic swap and prune
        uses: appleboy/ssh-action@v1
        env:
          RELEASES_TO_KEEP: ${{ env.RELEASES_TO_KEEP }}
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          command_timeout: 5m
          envs: RELEASES_TO_KEEP
          script_path: .github/scripts/deploy.sh

      - name: Health check
        run: |
          sleep 2
          curl -fsS --retry 5 --retry-delay 3 -o /dev/null -w "HTTP %{http_code}\n" https://patriciomanquepillan.com/
