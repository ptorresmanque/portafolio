name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASES_TO_KEEP: "3"
      NODE_VERSION: "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify _htaccess is in build output
        run: test -f dist/portafolio/browser/_htaccess || (echo "::error::_htaccess missing from build output" && exit 1)

      - name: Clean staging on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          script: rm -rf ~/public_html_new && mkdir -p ~/public_html_new

      - name: Sync build to staging
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          source: "dist/portafolio/browser"
          target: "~/public_html_new"

      - name: Atomic swap and prune
        uses: appleboy/ssh-action@v1
        env:
          RELEASES_TO_KEEP: ${{ env.RELEASES_TO_KEEP }}
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          command_timeout: 5m
          envs: RELEASES_TO_KEEP
          script_path: .github/scripts/deploy.sh
