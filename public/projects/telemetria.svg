      <text x="50" y="56" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">ESTANQUE</text>
      <text x="50" y="70" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">E-01</text>
      <text x="50" y="200" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#E0F0FF" text-anchor="middle">73.2%</text>
    </g>

    <g transform="translate(590, 30)">
      <rect x="0" y="0" width="100" height="300" rx="8" fill="none" stroke="#42A5F5" stroke-width="2"/>
      <rect x="6" y="40" width="88" height="254" fill="url(#tankFill)"/>
      <line x1="6" y1="40" x2="94" y2="40" stroke="#80B4D8" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="50" y="56" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">ESTANQUE</text>
      <text x="50" y="70" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">E-02</text>
      <text x="50" y="180" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#E0F0FF" text-anchor="middle">86.5%</text>
