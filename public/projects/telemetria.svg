      <text x="80" y="200" font-family="Consolas, ui-monospace, monospace" font-size="13" font-weight="600" fill="#E0F0FF" text-anchor="middle">64.8%</text>
      <text x="80" y="218" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA" text-anchor="middle">NIVEL</text>
    </g>

    <!-- Pipe filter → tanks -->
