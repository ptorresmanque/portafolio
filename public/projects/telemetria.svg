<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#050D17"/>
    </linearGradient>
    <linearGradient id="tankFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bgGrad)"/>

  <!-- Title bar (AVEVA InTouch-style) -->
  <rect x="0" y="0" width="1600" height="36" fill="#0D2840"/>
  <text x="20" y="24" font-family="Consolas, ui-monospace, monospace" font-size="13" fill="#80B4D8" letter-spacing="2">AVEVA</text>
  <text x="68" y="24" font-family="Consolas, ui-monospace, monospace" font-size="13" fill="#FFFFFF" letter-spacing="1">System Platform · WindowViewer</text>
  <text x="1480" y="24" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#5A7A95">InTouch · v2020 R2</text>

  <!-- Menu bar -->
  <rect x="0" y="36" width="1600" height="28" fill="#102D44"/>
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#B0C8DD">
    <text x="20" y="55">File</text>
    <text x="56" y="55">Edit</text>
    <text x="92" y="55">View</text>
    <text x="134" y="55">Configure</text>
    <text x="200" y="55">Graphics</text>
    <text x="258" y="55">Window</text>
    <text x="310" y="55">Tools</text>
    <text x="352" y="55">Help</text>
  </g>
  <text x="1500" y="55" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#5A8AAA">● CONNECTED</text>

