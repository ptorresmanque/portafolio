    <rect y="14" width="228" height="36" rx="2" fill="#1A1010" stroke="#5C2222"/>
    <circle cx="14" cy="32" r="4" fill="#EF5350"/>
    <text x="28" y="30" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FF8A80">PRIORITY · 2</text>
    <text x="28" y="42" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#B89090">BBA-01 · Vib. alta</text>

    <rect y="58" width="228" height="36" rx="2" fill="#1A1010" stroke="#5C2222"/>
    <circle cx="14" cy="76" r="4" fill="#FFA726"/>
    <text x="28" y="74" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFCC80">PRIORITY · 8</text>
    <text x="28" y="86" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#B89090">F-01 · Δ presión</text>

    <rect y="102" width="228" height="36" rx="2" fill="#0F1F30" stroke="#2A5070"/>
    <circle cx="14" cy="120" r="4" fill="#42A5F5"/>
    <text x="28" y="118" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#90CAF9">PRIORITY · 14</text>
    <text x="28" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#7099B8">E-01 · Nivel alto</text>
