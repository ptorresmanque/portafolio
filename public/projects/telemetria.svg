    <text x="0" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA">00:00</text>
    <text x="780" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA" text-anchor="middle">12:00</text>
    <text x="1560" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA" text-anchor="end">23:59</text>
