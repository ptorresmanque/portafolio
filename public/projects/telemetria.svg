    <text x="22" y="84">Runtime</text>
    <rect x="88" y="70" width="56" height="20" rx="2" fill="#163652" stroke="#2A5070"/>
    <text x="98" y="84">Engine</text>
    <rect x="154" y="70" width="60" height="20" rx="2" fill="#163652" stroke="#2A5070"/>
    <text x="162" y="84">Alarm</text>
    <rect x="222" y="70" width="60" height="20" rx="2" fill="#163652" stroke="#2A5070"/>
    <text x="234" y="84">Trends</text>
    <rect x="290" y="70" width="60" height="20" rx="2" fill="#163652" stroke="#2A5070"/>
    <text x="298" y="84">Reports</text>
  </g>

  <!-- Left tree panel -->
