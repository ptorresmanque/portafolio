    <polyline fill="none" stroke="#42A5F5" stroke-width="1.5" points="0,30 12,28 24,32 36,26 48,30 60,22 72,28 84,18 96,24 108,20 120,28 132,15 144,22 156,12 168,20 180,18 192,15 204,22"/>
