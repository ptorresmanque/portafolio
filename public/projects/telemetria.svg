    <text y="22" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="600" fill="#E0F0FF">Caudal diario PTAP Iquique</text>
  </g>

  <!-- Big trend chart at bottom -->
  <g transform="translate(20, 940)">
