    <text x="46" y="172">Aguas Altiplano</text>

    <!-- Sub-items -->
    <text x="46" y="196" fill="#80B4D8">▼</text>
    <text x="62" y="196">PTAP Iquique</text>
    <g fill="#7099B8" font-size="10">
      <text x="78" y="220">NI-Norte</text>
      <text x="78" y="240">NI-Sur</text>
      <text x="78" y="260">SALA SCADA</text>
    </g>

    <text x="46" y="296" fill="#80B4D8">▼</text>
    <text x="62" y="296">PTAP Calama</text>
    <g fill="#7099B8" font-size="10">
      <text x="78" y="320">NI-01</text>
      <text x="78" y="340">NI-02</text>
    </g>

    <text x="30" y="380" fill="#80B4D8">▶</text>
    <text x="46" y="380">Aguas Chañar</text>

    <text x="30" y="408" fill="#80B4D8">▶</text>
    <text x="46" y="408">Aguas Araucanía</text>

    <text x="30" y="436" fill="#80B4D8">▶</text>
    <text x="46" y="436">Aguas Magallanes</text>

    <text x="14" y="476" fill="#80B4D8">▶</text>
    <text x="30" y="476">Alarmas</text>
    <text x="14" y="500" fill="#80B4D8">▶</text>
    <text x="30" y="500">Históricos</text>
    <text x="14" y="524" fill="#80B4D8">▶</text>
    <text x="30" y="524">Reportes</text>
  </g>

  <text x="14" y="956" font-family="Consolas, ui-monospace, monospace" font-size="9" fill="#5A7A95">OpCenter v2020 · IDE 4.4</text>

  <!-- Main canvas (process graphic area) -->
  <rect x="240" y="96" width="1100" height="770" fill="#091828"/>

  <!-- Process title -->
  <text x="270" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#5A8AAA" letter-spacing="1">PROCESO · AGUA POTABLE</text>
  <text x="270" y="160" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="600" fill="#E0F0FF">PTAP IQUIQUE · Sala SCADA</text>
  <text x="270" y="184" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#7099B8">Desalinizadora por ósmosis inversa · Capacidad nominal 600 L/s</text>

  <!-- Process graphic: pumps (left), filters (center), tanks (right), pipes connecting -->
  <g transform="translate(270, 240)">

    <!-- Pump 1 -->
    <g transform="translate(0, 0)">
      <circle cx="50" cy="80" r="36" fill="none" stroke="#42A5F5" stroke-width="2"/>
      <circle cx="50" cy="80" r="22" fill="#163652" stroke="#42A5F5" stroke-width="1.5"/>
      <path d="M 50 80 L 65 95 L 35 95 Z" fill="#42A5F5"/>
      <text x="50" y="148" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">BBA-01</text>
      <text x="50" y="162" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#90CAF9" text-anchor="middle">146.2 L/s</text>
      <text x="50" y="176" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA" text-anchor="middle">RUNNING</text>
    </g>

    <!-- Pump 2 -->
    <g transform="translate(0, 200)">
      <circle cx="50" cy="80" r="36" fill="none" stroke="#42A5F5" stroke-width="2"/>
      <circle cx="50" cy="80" r="22" fill="#163652" stroke="#42A5F5" stroke-width="1.5"/>
      <path d="M 50 80 L 65 95 L 35 95 Z" fill="#42A5F5"/>
      <text x="50" y="148" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#B8D0E4" text-anchor="middle">BBA-02</text>
      <text x="50" y="162" font-family="Consolas, ui-monospace, monospace" font-size="11" fill="#90CAF9" text-anchor="middle">138.7 L/s</text>
      <text x="50" y="176" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5A8AAA" text-anchor="middle">RUNNING</text>
    </g>

    <!-- Pipe between pumps and filter -->
    <line x1="86" y1="80" x2="200" y2="80" stroke="#2A5070" stroke-width="3"/>
    <line x1="86" y1="280" x2="200" y2="280" stroke="#2A5070" stroke-width="3"/>
    <line x1="200" y1="80" x2="200" y2="280" stroke="#2A5070" stroke-width="3"/>

