  <rect x="0" y="96" width="240" height="878" fill="none" stroke="#1A3450" stroke-width="1"/>
  <text x="14" y="120" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7099B8" letter-spacing="1">CONFIGURACIÓN</text>

  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#B8D0E4">
