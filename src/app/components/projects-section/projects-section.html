<section id="proyectos" class="relative py-20 md:py-32">
  <div class="mx-auto max-w-6xl px-6">
    <header class="mb-12 md:mb-16">
      <p class="mb-3 text-xs font-medium uppercase tracking-[0.2em] text-accent">Proyectos</p>
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <h2 class="text-display max-w-xl text-4xl text-foreground md:text-5xl">
          Productos en producción.
          <span class="text-accent">Cada uno con quien me supervisó firmando la review.</span>
        </h2>
        <p class="max-w-sm text-sm leading-relaxed text-secondary">
          En cada tarjeta está el rol que tuve, las tecnologías principales y un botón para abrir la carta firmada por quien me supervisó.
        </p>
      </div>
    </header>

    <div class="grid gap-6 md:grid-cols-2 md:gap-8">
      @for (project of projects(); track project.id; let i = $index) {
        <app-project-card
          [project]="project"
          [index]="i"
          (openDialog)="openDialog.emit($event)"
        />
      }
    </div>
  </div>
</section>
