<dialog
  #dialog
  (click)="onDialogClick($event)"
  (cancel)="onCancel($event)"
  class="m-0 max-h-screen w-screen max-w-none border-0 p-0 backdrop:bg-black/40"
  [attr.aria-labelledby]="project() ? 'dialog-title-' + project()!.id : null"
>
  @if (project(); as p) {
    <div
      class="flex max-h-[100dvh] w-screen flex-col bg-background text-foreground"
      role="document"
    >
      <header class="flex items-center justify-between border-b border-border px-6 py-4 md:px-10">
        <div class="flex flex-col">
          <p class="text-xs uppercase tracking-[0.2em] text-accent">Carta de recomendación</p>
          <h2
            [id]="'dialog-title-' + p.id"
            class="text-display text-lg font-bold text-foreground md:text-xl"
          >
            {{ p.title }} · {{ p.company }}
          </h2>
        </div>
        <button
          type="button"
          (click)="closeDialog.emit()"
          class="inline-flex size-10 items-center justify-center rounded-full border border-border text-foreground transition-colors hover:bg-muted"
          aria-label="Cerrar diálogo"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </header>

      <div class="flex-1 overflow-auto bg-muted/40">
        <div class="mx-auto flex min-h-full max-w-4xl items-center justify-center p-6 md:p-10">
          <!--
            width/height intrínsecos del placeholder actual (1200x900).
            Si reemplazas la imagen por una carta con otro aspect-ratio,
            actualiza estos dos atributos para mantener la reserva de espacio (CLS=0)
            y evitar el warning de NgOptimizedImage.
          -->
          <img
            [ngSrc]="p.letterImage"
            [alt]="p.letterAlt"
            width="1200"
            height="900"
            class="max-h-[78dvh] h-auto w-auto max-w-full rounded-lg border border-border bg-background object-contain shadow-[0_30px_60px_-30px_rgba(9,9,11,0.25)]"
          />
        </div>
      </div>

      <footer class="flex flex-col gap-2 border-t border-border bg-background px-6 py-4 text-xs text-secondary md:flex-row md:items-center md:justify-between md:px-10">
        <span>Responsable: {{ p.company }}</span>
        <span class="hidden md:block">Pulsa <kbd class="rounded border border-border bg-muted px-1.5 py-0.5 font-mono text-[10px]">Esc</kbd> para cerrar</span>
      </footer>
    </div>
  }
</dialog>
